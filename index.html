<h2>よくある質問</h2>

<h3>Q. プロジェクトのコードを変更しますか？</h3>
<p>いいえ。Canopy は読み取り専用です。コードを変更・削除することはありません。</p>

<h3>Q. インターネット接続は必要ですか？</h3>
<p>不要です。すべての解析はローカルで実行されます。</p>

<h3>Q. 対応環境は？</h3>
<p>macOS 15.0 以降が必要です。</p>
